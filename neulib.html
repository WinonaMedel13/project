<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>NEU Library — Welcome</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700;800&family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --orange: #E08134;
      --orange-dark: #c06820;
      --white: #FFFFFF;
      --navy: #334796;
      --cream: #FFEABD;
      --navy-dark: #1e2d63;
    }

    html, body {
      height: 100%;
      font-family: 'Outfit', sans-serif;
      overflow: hidden;
    }

    /* ── BACKGROUND ── */
    .bg-layer {
      position: fixed;
      inset: 0;
      background: url('https://www.manilatimes.net/manilatimes/uploads/images/2021/10/07/19096.jpg') center / cover no-repeat;
      z-index: 0;
    }

    .bg-overlay {
      position: fixed;
      inset: 0;
      background: linear-gradient(
        120deg,
        rgba(20, 30, 70, 0.92) 0%,
        rgba(40, 60, 140, 0.75) 45%,
        rgba(242, 138, 46, 0.35) 100%
      );
      z-index: 1;
    }

    .bg-grain {
      position: fixed;
      inset: 0;
      z-index: 2;
      opacity: 0.03;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)'/%3E%3C/svg%3E");
    }

    /* ── FLOATING SHAPES ── */
    .shape {
      position: fixed;
      border-radius: 50%;
      z-index: 2;
      animation: floatShape 8s ease-in-out infinite;
    }
    .shape-1 {
      width: 360px; height: 360px;
      top: -100px; right: -100px;
      background: radial-gradient(circle, rgba(224,129,52,0.22) 0%, transparent 70%);
      animation-delay: 0s;
    }
    .shape-2 {
      width: 260px; height: 260px;
      bottom: -70px; left: -70px;
      background: radial-gradient(circle, rgba(255,234,189,0.13) 0%, transparent 70%);
      animation-delay: -3s;
    }
    .shape-3 {
      width: 200px; height: 200px;
      top: 45%; left: 8%;
      background: radial-gradient(circle, rgba(51,71,150,0.28) 0%, transparent 70%);
      animation-delay: -6s;
    }
    @keyframes floatShape {
      0%, 100% { transform: translateY(0px) scale(1); }
      50%       { transform: translateY(-22px) scale(1.05); }
    }

    /* ── HEADER ── */
    header {
      position: fixed;
      top: 0; left: 0;
      width: 100%;
      z-index: 9999;
      display: grid;
      grid-template-columns: 1fr auto 1fr;
      align-items: center;
      padding: 0 32px;
      height: 72px;
      background: rgba(24, 36, 90, 0.82);
      backdrop-filter: blur(18px) saturate(160%);
      -webkit-backdrop-filter: blur(18px) saturate(160%);
      border-bottom: 1px solid rgba(255, 255, 255, 0.10);
      box-shadow: 0 4px 32px rgba(0, 0, 0, 0.30);
      animation: headerIn 0.7s cubic-bezier(0.22, 1, 0.36, 1) both;
    }

    @keyframes headerIn {
      from { opacity: 0; transform: translateY(-20px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* left spacer — keeps title perfectly centered */
    .header-left { display: flex; align-items: center; }

    .header-brand {
      font-family: 'Playfair Display', serif;
      font-size: 26px;
      font-weight: 800;
      color: var(--white);
      letter-spacing: -0.4px;
      white-space: nowrap;
    }
    .header-brand span { color: var(--orange); }

    .header-right {
      display: flex;
      justify-content: flex-end;
      align-items: center;
    }

    .logout-btn {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 9px 20px;
      border: 1.5px solid rgba(255, 234, 189, 0.40);
      background: rgba(255, 255, 255, 0.07);
      color: var(--cream);
      border-radius: 12px;
      font-family: 'Outfit', sans-serif;
      font-size: 13.5px;
      font-weight: 600;
      cursor: pointer;
      text-decoration: none;
      letter-spacing: 0.3px;
      transition: background 0.25s, border-color 0.25s, color 0.25s, transform 0.2s, box-shadow 0.25s;
    }
    .logout-btn svg {
      width: 15px; height: 15px;
      stroke: currentColor;
      fill: none;
      stroke-width: 2;
      flex-shrink: 0;
      transition: transform 0.25s;
    }
    .logout-btn:hover {
      background: rgba(224, 129, 52, 0.18);
      border-color: var(--orange);
      color: var(--orange);
      transform: translateY(-1px);
      box-shadow: 0 6px 20px rgba(224, 129, 52, 0.25);
    }
    .logout-btn:hover svg {
      transform: translateX(2px);
    }

    /* ── PAGE BODY ── */
    .page-wrapper {
      position: relative;
      z-index: 10;
      height: 100vh;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: flex-start;
      padding-left: 6%;
      padding-top: 72px; /* offset for fixed header */
    }

    /* decorative accent line */
    .accent-line {
      width: 60px;
      height: 4px;
      border-radius: 2px;
      background: linear-gradient(90deg, var(--orange), var(--cream));
      margin-bottom: 22px;
      animation: slideInLeft 0.8s 0.4s cubic-bezier(0.22, 1, 0.36, 1) both;
    }

    .welcome-label {
      font-family: 'Outfit', sans-serif;
      font-size: 13px;
      font-weight: 600;
      letter-spacing: 3px;
      text-transform: uppercase;
      color: var(--orange);
      margin-bottom: 14px;
      animation: slideInLeft 0.8s 0.5s cubic-bezier(0.22, 1, 0.36, 1) both;
    }

    .welcome-heading {
      font-family: 'Playfair Display', serif;
      font-size: clamp(42px, 6vw, 72px);
      font-weight: 800;
      color: var(--white);
      line-height: 1.12;
      letter-spacing: -1px;
      text-shadow: 0 6px 28px rgba(0, 0, 0, 0.50);
      animation: slideInLeft 0.85s 0.3s cubic-bezier(0.22, 1, 0.36, 1) both;
    }

    .welcome-heading span {
      color: var(--cream);
      display: block;
    }

    .welcome-sub {
      margin-top: 20px;
      font-size: 17px;
      font-weight: 400;
      color: rgba(255, 234, 189, 0.72);
      max-width: 420px;
      line-height: 1.65;
      animation: slideInLeft 0.85s 0.55s cubic-bezier(0.22, 1, 0.36, 1) both;
    }

    /* pill badge */
    .status-badge {
      margin-top: 32px;
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 9px 20px;
      background: rgba(255,255,255,0.08);
      border: 1px solid rgba(255,255,255,0.18);
      border-radius: 50px;
      font-size: 13px;
      font-weight: 500;
      color: rgba(255,255,255,0.75);
      backdrop-filter: blur(8px);
      animation: slideInLeft 0.85s 0.7s cubic-bezier(0.22, 1, 0.36, 1) both;
    }
    .status-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: #4caf82;
      box-shadow: 0 0 0 3px rgba(76, 175, 130, 0.28);
      animation: pulse 2.5s ease-in-out infinite;
    }
    @keyframes pulse {
      0%, 100% { box-shadow: 0 0 0 3px rgba(76, 175, 130, 0.28); }
      50%       { box-shadow: 0 0 0 6px rgba(76, 175, 130, 0.10); }
    }

    @keyframes slideInLeft {
      from { opacity: 0; transform: translateX(-30px); }
      to   { opacity: 1; transform: translateX(0); }
    }

    /* ── RESPONSIVE ── */
    @media (max-width: 600px) {
      header { padding: 0 20px; height: 64px; }
      .header-brand { font-size: 20px; }
      .logout-btn { padding: 8px 14px; font-size: 12.5px; }
      .page-wrapper { padding-left: 7%; padding-right: 7%; }
      .welcome-sub { font-size: 15px; }
    }
  </style>
</head>
<body>

  <!-- Background Layers -->
  <div class="bg-layer"></div>
  <div class="bg-overlay"></div>
  <div class="bg-grain"></div>
  <div class="shape shape-1"></div>
  <div class="shape shape-2"></div>
  <div class="shape shape-3"></div>

  <!-- ── HEADER ── -->
  <header>
    <!-- Left spacer (mirrors logout button width for perfect centering) -->
    <div class="header-left"></div>

    <!-- Center: Brand -->
    <div class="header-brand">NEU <span>Library</span></div>

    <!-- Right: Logout -->
    <div class="header-right">
      <a href="index.html" class="logout-btn">
        <svg viewBox="0 0 24 24">
          <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/>
          <polyline points="16 17 21 12 16 7"/>
          <line x1="21" y1="12" x2="9" y2="12"/>
        </svg>
        Log Out
      </a>
    </div>
  </header>

  <!-- ── MAIN CONTENT ── -->
  <div class="page-wrapper">
    <div class="accent-line"></div>
    <div class="welcome-label">Visitor Access</div>
    <h1 class="welcome-heading">
      Welcome to
      <span>NEU Library!</span>
    </h1>
    <p class="welcome-sub">
      Explore our resources and enjoy a seamless library experience.
      Your knowledge journey starts here.
    </p>
    <div class="status-badge">
      <div class="status-dot"></div>
      Library is currently open
    </div>
  </div>
<script>
window.onload = () => {
  // Check if user exists
  const session = JSON.parse(localStorage.getItem('neuLibrarySession'));
  if (session) {
    // Dynamic welcome message
    const heading = document.querySelector('.welcome-heading');
    heading.innerHTML = `Welcome back, <span>${session.fullName || session.email}</span>!`;
    
    // 👇 ADD ADMIN SWITCH BUTTON (only for admins)
    if (session.isAdmin || session.role === 'admin') {
      // Add button to header-right
      const headerRight = document.querySelector('.header-right');
      headerRight.innerHTML = `
        <a href="#" onclick="switchToAdmin()" class="admin-switch-btn">
          <svg viewBox="0 0 24 24" style="width:15px;height:15px;">
            <path d="M12 2L2 7v5c0 11.46 7.21 21 16 21h2c2.96 0 4-2.04 4-4V7l-10-5z"/>
            <polyline points="2 17 16 17 16 21"/>
          </svg>
          Admin Panel
        </a>
      `;
      
      // Add styles
      const style = document.createElement('style');
      style.textContent = `
        .admin-switch-btn {
          display: inline-flex; align-items: center; gap: 8px;
          padding: 9px 20px; border: 2px solid var(--orange);
          background: rgba(224,129,52,.15); color: var(--orange);
          border-radius: 12px; font-family: 'Outfit', sans-serif;
          font-size: 13.5px; font-weight: 600; cursor: pointer;
          text-decoration: none; transition: all .3s;
        }
        .admin-switch-btn:hover {
          background: var(--orange); color: white;
          transform: translateY(-2px); box-shadow: 0 6px 20px rgba(224,129,52,.4);
        }
      `;
      document.head.appendChild(style);
    }
  }
};

// 👇 SWITCH TO ADMIN FUNCTION
function switchToAdmin() {
  const session = JSON.parse(localStorage.getItem('neuLibrarySession'));
  // Ensure admin role
  session.isAdmin = true;
  session.role = 'admin';
  localStorage.setItem('neuLibrarySession', JSON.stringify(session));
  window.location.href = 'admin-dashboard.html';
}
</script>
</body>
</html>
