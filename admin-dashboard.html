<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Dashboard - NEU Library</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700;800&family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    :root {--orange:#E08134;--cream:#FFEABD;--navy:#334796;--navy-dark:#1e2d63;}
    *{box-sizing:border-box;margin:0;padding:0;}
    body{font-family:'Outfit',sans-serif;background:linear-gradient(135deg,#0a1428 0%,#1a2540 100%);color:white;min-height:100vh;}
    .header{display:flex;justify-content:space-between;align-items:center;padding:24px 40px;background:rgba(30,45,99,.95);backdrop-filter:blur(20px);border-bottom:1px solid rgba(255,255,255,.1);}
    .header h1{font-family:'Playfair Display',serif;font-size:28px;margin:0;}
    .btn-group button{margin-left:12px;padding:12px 24px;border:none;border-radius:12px;cursor:pointer;font-weight:600;font-size:14px;transition:all .3s;}
    .admin-btn{background:var(--orange);color:white;}
    .logout-btn{background:#666;color:white;}
    .admin-btn:hover{background:#c06820;}
    .stats-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(240px,1fr));gap:28px;padding:60px 40px;max-width:1400px;margin:0 auto;}
    .stat-card{background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.15);border-radius:20px;padding:36px 24px;text-align:center;backdrop-filter:blur(16px);transition:transform .3s;}
    .stat-card:hover{transform:translateY(-8px);}
    .stat-card h3{color:var(--cream);font-size:14px;font-weight:600;text-transform:uppercase;letter-spacing:1.5px;margin-bottom:16px;}
    .stat-number{font-size:48px;font-weight:800;color:var(--orange);font-family:'Playfair Display',serif;margin-bottom:8px;}
    .filters{max-width:1000px;margin:0 auto 50px;padding:0 40px;display:flex;flex-wrap:wrap;gap:16px;align-items:center;}
    .filters select{padding:14px 20px;border:1px solid rgba(255,255,255,.25);background:rgba(255,255,255,.08);color:white;border-radius:12px;font-size:14px;cursor:pointer;}
    .filters button{padding:14px 28px;background:var(--orange);border:none;color:white;border-radius:12px;font-weight:600;cursor:pointer;}
    .welcome-admin{position:absolute;top:100px;right:40px;background:var(--orange);color:white;padding:12px 24px;border-radius:12px;font-weight:600;}
    @media(max-width:768px){.header{padding:20px;}.stats-grid,.filters{padding:20px;grid-template-columns:1fr;}.filters{flex-direction:column;}}
  </style>
</head>
<body>
  <div class="header">
    <h1>📊 Library Admin Dashboard</h1>
    <div class="btn-group">
      <button id="switchUser" class="admin-btn">👤 Switch to Regular User</button>
      <button onclick="logout()" class="logout-btn">🚪 Logout</button>
    </div>
  </div>

  <div class="welcome-admin">Admin Mode Active</div>

  <div class="filters">
    <select id="period"><option>Today</option><option>This Week</option><option>All Time</option></select>
    <select id="reason"><option>All Reasons</option><option>Research</option><option>Borrowing</option></select>
    <select id="college"><option>All Colleges</option><option>CAS</option><option>COE</option></select>
    <select id="employee"><option>All Visitors</option><option>Employees Only</option><option>Students Only</option></select>
    <button onclick="loadStats()">🔄 Update Stats</button>
  </div>

  <div class="stats-grid">
    <div class="stat-card">
      <h3>Total Visitors</h3>
      <div class="stat-number" id="total">0</div>
    </div>
    <div class="stat-card">
      <h3>Today's Visits</h3>
      <div class="stat-number" id="today">0</div>
    </div>
    <div class="stat-card">
      <h3>This Week</h3>
      <div class="stat-number" id="week">0</div>
    </div>
    <div class="stat-card">
      <h3>Unique Emails</h3>
      <div class="stat-number" id="unique">0</div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script>
    const SUPABASE_URL='https://wfpqbyfgjserwlynstcx.supabase.co';
    const SUPABASE_ANON_KEY='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6IndmcHFieWZnanNlcndseW5zdGN4Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM1ODAyODUsImV4cCI6MjA4OTE1NjI4NX0.g8rWx_RZWOwpzpKyzf_nDUBVzy3v-u2LtXYyLSL1Up8';
    const client=supabase.createClient(SUPABASE_URL,SUPABASE_ANON_KEY);

    // Check admin
    const session=JSON.parse(localStorage.getItem('neuLibrarySession'));
    if(!session?.isAdmin)window.location.href='neulogin';

    async function loadStats(){
      try{
        const today=new Date().toISOString().split('T')[0];
        const weekAgo=new Date(Date.now()-7*86400000).toISOString().split('T')[0];
        
        // Total
        const{count:tot}=await client.from('visitor_logs').select('*',{count:'exact',head:true});
        document.getElementById('total').textContent=tot||0;
        
        // Today  
        const{count:todayC}=await client.from('visitor_logs').select('*',{count:'exact',head:true}).gte('created_at',today);
        document.getElementById('today').textContent=todayC||0;
        
        // Week
        const{count:weekC}=await client.from('visitor_logs').select('*',{count:'exact',head:true}).gte('created_at',weekAgo);
        document.getElementById('week').textContent=weekC||0;
        
        // Unique emails
        const{count:uniq}=await client.from('visitor_logs').select('email',{count:'exact',head:true});
        document.getElementById('unique').textContent=uniq||0;
      }catch(e){console.error(e);}
    }

    document.getElementById('switchUser').onclick=()=>{
      localStorage.setItem('neuLibrarySession',JSON.stringify({...session,isAdmin:false,role:'user'}));
      window.location.href='neulib.html';
    };

    function logout(){
      localStorage.removeItem('neuLibrarySession');
      window.location.href='neulogin';
    }

    loadStats();
  </script>
</body>
</html>
