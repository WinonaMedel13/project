<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>NEU Library - Create Account</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700;800&family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>

<style>
*, *::before, *::after { box-sizing: border-box; margin:0; padding:0; }

:root{
  --orange:#f28a2e;
  --white:#ffffff;
  --navy:#2f3e86;
  --cream:#FFEABD;
  --navy-dark:#1b275c;
  --orange-dark:#d8741e;
  --glass-bg:rgba(24,36,82,0.78);
  --glass-border:rgba(255,255,255,0.18);
}

html,body{ min-height:100%; font-family:'Outfit',sans-serif; }

body {
  background: url('https://smapse.com/storage/2020/05/converted/825_585_6-51.jpg') center center / cover no-repeat fixed;
  display: flex;
  align-items: center;
  justify-content: center;
  min-height: 100vh;
  padding: 40px 20px;
  position: relative;
}

body::before{
  content:'';
  position:fixed;
  inset:0;
  background:linear-gradient(120deg,rgba(20,30,70,0.92) 0%,rgba(40,60,140,0.75) 45%,rgba(242,138,46,0.35) 100%);
  z-index:0;
}

body::after{
  content:'';
  position:fixed;
  inset:0;
  background:radial-gradient(ellipse at 70% 20%,rgba(255,234,189,0.08) 0%,transparent 60%);
  z-index:0;
}

/* TOAST */
#toast-container{
  position:fixed;
  top:28px;
  right:28px;
  z-index:9999;
  display:flex;
  flex-direction:column;
  gap:10px;
}

.toast{
  background:var(--navy-dark);
  color:var(--white);
  padding:14px 22px;
  border-radius:12px;
  font-size:.88rem;
  font-weight:500;
  border-left:4px solid var(--orange);
  box-shadow:0 8px 30px rgba(0,0,0,0.35);
  transform:translateX(120%);
  opacity:0;
  transition:all .4s cubic-bezier(.34,1.56,.64,1);
  min-width:260px;
  max-width:320px;
}

.toast.show{transform:translateX(0);opacity:1;}
.toast.success{border-left-color:#4caf82;}
.toast.error{border-left-color:#e05252;}
.toast.info{border-left-color:var(--cream);}

/* CARD */
.card-wrapper{
  position:relative;
  z-index:10;
  width:100%;
  max-width:520px;
  animation:cardIn .8s cubic-bezier(.34,1.56,.64,1) both;
}

@keyframes cardIn{
  from{opacity:0;transform:translateY(40px) scale(.96);}
  to{opacity:1;transform:translateY(0) scale(1);}
}

.card{
  background:var(--glass-bg);
  border:1px solid var(--glass-border);
  backdrop-filter:blur(18px);
  -webkit-backdrop-filter:blur(18px);
  padding:42px 42px 38px;
  border-radius:20px;
  box-shadow:0 40px 80px rgba(0,0,0,.55), inset 0 1px 0 rgba(255,255,255,.15);
}

/* HEADER */
.card-header{text-align:center;margin-bottom:32px;}

.logo-ring{
  width:64px;
  height:64px;
  border-radius:50%;
  background:linear-gradient(135deg,var(--orange),var(--navy));
  display:flex;
  align-items:center;
  justify-content:center;
  margin:0 auto 14px;
  box-shadow:0 8px 24px rgba(224,129,52,.40);
  animation:pulse 3s ease-in-out infinite;
}

@keyframes pulse{
  0%,100%{box-shadow:0 8px 24px rgba(224,129,52,.40);}
  50%{box-shadow:0 8px 36px rgba(224,129,52,.70);}
}

.logo-ring svg{width:32px;height:32px;fill:white;}

.card-title{
  font-family:'Playfair Display',serif;
  font-size:1.9rem;
  font-weight:800;
  color:var(--white);
  letter-spacing:-0.3px;
}

.card-title span{color:var(--cream);}

.card-sub{
  font-size:.82rem;
  color:rgba(255,255,255,.65);
  margin-top:6px;
  letter-spacing:.5px;
  text-transform:uppercase;
}

/* DIVIDER */
.divider{
  display:flex;
  align-items:center;
  gap:12px;
  margin:6px 0 24px;
}

.divider hr{
  flex:1;
  border:none;
  border-top:1px solid rgba(255,255,255,.15);
}

.divider span{
  font-size:.75rem;
  color:rgba(255,255,255,.40);
  white-space:nowrap;
}

/* GRID */
.form-grid{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:16px;
}

.form-grid .full{grid-column:1/-1;}

/* FIELD */
.field{
  position:relative;
  opacity:0;
  transform:translateY(14px);
  animation:fieldIn .5s ease forwards;
}

@keyframes fieldIn{ to{opacity:1;transform:translateY(0);} }

.field label{
  display:block;
  font-size:.75rem;
  font-weight:600;
  color:var(--cream);
  letter-spacing:.6px;
  text-transform:uppercase;
  margin-bottom:6px;
}

.field label .req{color:var(--orange);}

.input-wrap{
  position:relative;
  display:flex;
  align-items:center;
}

.input-wrap .icon{
  position:absolute;
  left:14px;
  display:flex;
  pointer-events:none;
  color:rgba(255,255,255,.45);
}

.input-wrap .icon svg{
  width:17px;
  height:17px;
  stroke:currentColor;
  fill:none;
  stroke-width:2;
}

.input-wrap input,
.input-wrap select{
  width:100%;
  background:rgba(255,255,255,.10);
  border:1.5px solid rgba(255,255,255,.20);
  border-radius:12px;
  padding:13px 16px 13px 42px;
  font-family:'Outfit',sans-serif;
  font-size:.92rem;
  color:var(--white);
  outline:none;
  transition:border-color .25s, background .25s, box-shadow .25s;
}

.input-wrap input::placeholder{color:rgba(255,255,255,.35);}

.input-wrap input:focus,
.input-wrap select:focus{
  border-color:var(--orange);
  background:rgba(255,255,255,.16);
  box-shadow:0 0 0 3px rgba(242,138,46,.25);
}

/* BUTTON */
.btn-submit{
  width:100%;
  padding:15px;
  border-radius:13px;
  border:none;
  background:linear-gradient(135deg,#f28a2e,#d66f1b);
  color:white;
  font-family:'Outfit',sans-serif;
  font-size:1rem;
  font-weight:700;
  cursor:pointer;
  box-shadow:0 8px 24px rgba(224,129,52,.45);
  transition:transform .2s,box-shadow .2s, opacity .2s;
  margin-top:6px;
}

.btn-submit:hover{
  transform:translateY(-2px);
  box-shadow:0 12px 32px rgba(224,129,52,.6);
}

.btn-submit:disabled{
  opacity:.6;
  cursor:not-allowed;
  transform:none;
}

.btn-login{
  width:100%;
  padding:14px;
  border-radius:13px;
  border:1.5px solid rgba(255,255,255,.25);
  background:rgba(255,255,255,.08);
  color:var(--white);
  font-family:'Outfit',sans-serif;
  font-size:.95rem;
  font-weight:600;
  cursor:pointer;
  display:flex;
  align-items:center;
  justify-content:center;
  gap:10px;
  transition:.2s;
}

.btn-login:hover{
  background:rgba(51,71,150,.45);
  border-color:var(--navy);
  transform:translateY(-2px);
}

/* RESPONSIVE */
@media (max-width:500px){
  .card{padding:32px 22px 28px;}
  .form-grid{grid-template-columns:1fr;}
  .card-title{font-size:1.55rem;}
}
</style>
</head>

<body>

<!-- Toast Container -->
<div id="toast-container"></div>

<div class="card-wrapper">
  <div class="card">

    <div class="card-header">
      <div class="logo-ring">
        <svg viewBox="0 0 24 24">
          <path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5"/>
        </svg>
      </div>
      <div class="card-title">NEU <span>Library</span></div>
      <div class="card-sub">Register your Account</div>
    </div>

    <div class="divider">
      <hr/><span>Personal Information</span><hr/>
    </div>

    <form class="form-grid" id="registerForm" onsubmit="handleRegister(event)">

      <div class="field" style="animation-delay:.1s">
        <label>First Name <span class="req">*</span></label>
        <div class="input-wrap">
          <span class="icon">
            <svg viewBox="0 0 24 24"><circle cx="12" cy="7" r="4"/><path d="M5.5 21a6.5 6.5 0 0 1 13 0"/></svg>
          </span>
          <input id="firstName" type="text" placeholder="Juan" required>
        </div>
      </div>

      <div class="field" style="animation-delay:.15s">
        <label>Last Name <span class="req">*</span></label>
        <div class="input-wrap">
          <span class="icon">
            <svg viewBox="0 0 24 24"><circle cx="12" cy="7" r="4"/><path d="M5.5 21a6.5 6.5 0 0 1 13 0"/></svg>
          </span>
          <input id="lastName" type="text" placeholder="dela Cruz" required>
        </div>
      </div>

      <div class="field full" style="animation-delay:.2s">
        <label>School ID / Employee No.</label>
        <div class="input-wrap">
          <span class="icon">
            <svg viewBox="0 0 24 24"><rect x="2" y="5" width="20" height="14" rx="2"/><line x1="2" y1="10" x2="22" y2="10"/></svg>
          </span>
          <input id="schoolId" type="text" placeholder="2024-00001">
        </div>
      </div>

      <div class="field full" style="animation-delay:.25s">
        <label>Institutional Email <span class="req">*</span></label>
        <div class="input-wrap">
          <span class="icon">
            <svg viewBox="0 0 24 24"><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/><polyline points="22,6 12,13 2,6"/></svg>
          </span>
          <input id="email" type="email" placeholder="youremail@neu.edu.ph" required>
        </div>
      </div>

      <div class="field full" style="animation-delay:.3s">
        <label>Password <span class="req">*</span></label>
        <div class="input-wrap">
          <span class="icon">
            <svg viewBox="0 0 24 24"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
          </span>
          <input id="password" type="password" placeholder="Create a strong password" required minlength="6">
        </div>
      </div>

      <div class="field full" style="animation-delay:.35s">
        <label>Confirm Password <span class="req">*</span></label>
        <div class="input-wrap">
          <span class="icon">
            <svg viewBox="0 0 24 24"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
          </span>
          <input id="confirmPassword" type="password" placeholder="Repeat password" required>
        </div>
      </div>

      <div class="full" style="animation-delay:.4s; opacity:0; animation: fieldIn .5s .4s ease forwards;">
        <button type="submit" class="btn-submit" id="submitBtn">Create My Account</button>
      </div>

      <div class="full" style="animation-delay:.45s; opacity:0; animation: fieldIn .5s .45s ease forwards;">
        <button type="button" class="btn-login" onclick="window.location.href='neulogin.html'">
          Already have an account? Log In
        </button>
      </div>

    </form>

  </div>
</div>

<!-- Supabase CDN - KEEP THIS -->
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<script>
  // ✅ FIXED: NO duplicate supabase declaration
  const SUPABASE_URL = 'https://wfpqbyfgjserwlynstcx.supabase.co';
  const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6IndmcHFieWZnanNlcndseW5zdGN4Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM1ODAyODUsImV4cCI6MjA4OTE1NjI4NX0.g8rWx_RZWOwpzpKyzf_nDUBVzy3v-u2LtXYyLSL1Up8';

  // ✅ Use EXISTING global supabase from CDN
  const client = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

  // Toast function
  function showToast(message, type = 'info') {
    const container = document.getElementById('toast-container');
    const toast = document.createElement('div');
    toast.className = `toast ${type}`;
    toast.textContent = message;
    container.appendChild(toast);
    requestAnimationFrame(() => toast.classList.add('show'));
    setTimeout(() => {
      toast.classList.remove('show');
      setTimeout(() => toast.remove(), 500);
    }, 4000);
  }

  // ✅ MAIN REGISTER FUNCTION
  window.handleRegister = async function(event) {
    event.preventDefault();
    
    const firstName = document.getElementById('firstName').value.trim();
    const lastName = document.getElementById('lastName').value.trim();
    const schoolId = document.getElementById('schoolId').value.trim();
    const email = document.getElementById('email').value.trim();
    const password = document.getElementById('password').value;
    const confirmPassword = document.getElementById('confirmPassword').value;
    const submitBtn = document.getElementById('submitBtn');

    // Validation
    if (!firstName || !lastName || !email || password.length < 6 || password !== confirmPassword) {
      showToast('Complete all fields correctly', 'error');
      return;
    }

    submitBtn.disabled = true;
    submitBtn.textContent = 'Creating Account...';

    try {
      // 🚀 DIRECT SAVE TO visitor_logs
      const { data, error } = await client
        .from('visitor_logs')
        .insert({
          first_name: firstName,
          last_name: lastName,
          school_id: schoolId,
          email: email,
          password: btoa(password + 'neu-lib'),  // Simple secure hash
          full_name: `${firstName} ${lastName}`
        })
        .select()
        .single();

      console.log('✅ SAVED:', data);

      if (error) {
        if (error.code === '23505') {  // Duplicate key
          showToast('Email already exists! Login instead.', 'error');
        } else {
          throw error;
        }
      } else {
        localStorage.setItem('newUserEmail', email);
        showToast(`✅ Welcome ${firstName}! Redirecting...`, 'success');
        setTimeout(() => window.location.href = 'neulogin.html', 2000);
      }

    } catch (error) {
      console.error('Error:', error);
      showToast(error.message || 'Try again', 'error');
    } finally {
      submitBtn.disabled = false;
      submitBtn.textContent = 'Create My Account';
    }
  };
</script>

</body>
</html>
